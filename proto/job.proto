syntax = "proto3";

package jobqueue.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/mohammad-khos/distributed-job-queue/shared/proto;jobqueuev1";

service DispatcherService {
  rpc Connect(stream WorkerEvent) returns (stream DispatcherCommand);
}

message WorkerEvent {
  string worker_id = 1;

  oneof event {
    RegisterWorker register = 10;
    Heartbeat heartbeat = 11;
    JobAccepted job_accepted = 12;
    JobResult job_result = 13;
  }
}

message DispatcherCommand {
  oneof command {
    AssignJob assign_job = 10;
    CancelJob cancel_job = 11;
  }
}

message RegisterWorker {
  int32 concurrency = 1;
  repeated string capabilities = 2;
}

message Heartbeat {
  int32 available_slots = 1;
  int32 running_jobs = 2;
}

message AssignJob {
  string job_id = 1;
  string type = 2;
  int32 priority = 3;
  int32 retry_count = 4;
  int32 max_retries = 5;
  int32 timeout_seconds = 6;
  google.protobuf.Timestamp scheduled_at = 7;
  google.protobuf.Timestamp created_at = 8;
  bytes payload = 9;
}

message JobAccepted {
  string job_id = 1;
}

message JobResult {
  string job_id = 1;
  bool success = 2;
  bytes output = 3;
  string error_message = 4;
}

message CancelJob {
  string job_id = 1;
  string reason = 2;
}
